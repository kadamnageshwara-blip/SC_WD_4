<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Task Manager</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e3a8a,#06b6d4);
min-height:100vh;
overflow-x:hidden;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:250px;
height:100%;
background:rgba(0,0,0,.25);
backdrop-filter:blur(20px);
padding:30px;
color:white;
}

.logo{
font-size:28px;
font-weight:700;
margin-bottom:40px;
}

.menu{
display:flex;
flex-direction:column;
gap:15px;
}

.menu button{
padding:14px;
border:none;
border-radius:12px;
background:rgba(255,255,255,.15);
color:white;
cursor:pointer;
transition:.3s;
font-size:15px;
}

.menu button:hover{
background:#38bdf8;
transform:translateX(8px);
}

.main{
margin-left:270px;
padding:30px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.header h1{
color:white;
font-size:35px;
}

.theme{
padding:12px 22px;
border:none;
border-radius:30px;
background:white;
cursor:pointer;
font-weight:600;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
padding:25px;
border-radius:20px;
color:white;
box-shadow:0 10px 25px rgba(0,0,0,.2);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card h2{
font-size:38px;
margin-top:10px;
}

.add-section{
display:grid;
grid-template-columns:2fr 1fr 1fr 1fr auto;
gap:15px;
margin-bottom:25px;
}

.add-section input,
.add-section select{
padding:15px;
border:none;
border-radius:12px;
font-size:15px;
outline:none;
}

.addBtn{
background:#22c55e;
color:white;
border:none;
padding:15px 20px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

.addBtn:hover{
transform:scale(1.05);
background:#16a34a;
}

.search{
width:100%;
padding:15px;
border:none;
border-radius:12px;
margin-bottom:20px;
font-size:16px;
}

.progress{
height:15px;
background:#ddd;
border-radius:30px;
overflow:hidden;
margin-bottom:25px;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(to right,#22c55e,#06b6d4);
transition:.5s;
}

.task-list{
display:flex;
flex-direction:column;
gap:18px;
}

.task{
background:white;
border-radius:20px;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 10px 20px rgba(0,0,0,.15);
transition:.3s;
}

.task:hover{
transform:translateY(-5px);
}

.info h3{
font-size:20px;
margin-bottom:10px;
}

.info p{
color:#666;
}

.badge{
display:inline-block;
margin-top:10px;
padding:5px 14px;
border-radius:30px;
font-size:13px;
color:white;
}

.high{background:#ef4444;}
.medium{background:#f59e0b;}
.low{background:#22c55e;}

.buttons{
display:flex;
gap:10px;
}

.buttons button{
padding:10px 15px;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
font-weight:600;
}

.done{background:#22c55e;}
.edit{background:#f59e0b;}
.delete{background:#ef4444;}

.completed h3{
text-decoration:line-through;
color:#22c55e;
}

@media(max-width:900px){

.sidebar{
display:none;
}

.main{
margin-left:0;
}

.add-section{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
🚀 Nova Tasks
</div>

<div class="menu">

<button>🏠 Dashboard</button>

<button>📋 My Tasks</button>

<button>⭐ Important</button>

<button>✅ Completed</button>

<button onclick="toggleTheme()">
🌙 Theme
</button>

</div>

</div>

<div class="main">

<div class="header">

<h1>Smart Task Dashboard</h1>

</div>

<div class="cards">

<div class="card">
<p>Total Tasks</p>
<h2 id="total">0</h2>
</div>

<div class="card">
<p>Completed</p>
<h2 id="completed">0</h2>
</div>

<div class="card">
<p>Pending</p>
<h2 id="pending">0</h2>
</div>

</div>

<div class="add-section">

<input id="task" placeholder="Task Name">

<input type="date" id="date">

<input type="time" id="time">

<select id="priority">

<option>High</option>
<option>Medium</option>
<option>Low</option>

</select>

<button class="addBtn"
onclick="addTask()">

+ Add

</button>

</div>

<input
class="search"
id="search"
placeholder="Search Task..."
onkeyup="searchTask()">

<div class="progress">

<div
class="progress-bar"
id="bar">

</div>

</div>

<div
class="task-list"
id="list">

</div>

</div>

<script>

let tasks=
JSON.parse(localStorage.getItem("tasks"))||[];

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}
function updateStats(){

let total=tasks.length;

let completed=tasks.filter(t=>t.completed).length;

let pending=total-completed;

document.getElementById("total").innerHTML=total;

document.getElementById("completed").innerHTML=completed;

document.getElementById("pending").innerHTML=pending;

let percent=total==0?0:(completed/total)*100;

document.getElementById("bar").style.width=percent+"%";

save();

}

function render(){

const list=document.getElementById("list");

list.innerHTML="";

tasks.forEach((t,index)=>{

let div=document.createElement("div");

div.className="task";

if(t.completed){

div.classList.add("completed");

}

let color=t.priority.toLowerCase();

div.innerHTML=`

<div class="info">

<h3>${t.title}</h3>

<p>

📅 ${t.date || "No Date"}

&nbsp;&nbsp;

⏰ ${t.time || "--"}

</p>

<span class="badge ${color}">

${t.priority}

</span>

</div>

<div class="buttons">

<button

class="done"

onclick="toggleComplete(${index})">

${t.completed?"Undo":"Done"}

</button>

<button

class="edit"

onclick="editTask(${index})">

Edit

</button>

<button

class="delete"

onclick="deleteTask(${index})">

Delete

</button>

</div>

`;

list.appendChild(div);

});

updateStats();

}

function addTask(){

let title=document.getElementById("task").value.trim();

let date=document.getElementById("date").value;

let time=document.getElementById("time").value;

let priority=document.getElementById("priority").value;

if(title==""){

alert("Please enter a task");

return;

}

tasks.push({

title,

date,

time,

priority,

completed:false

});

document.getElementById("task").value="";

document.getElementById("date").value="";

document.getElementById("time").value="";

document.getElementById("priority").selectedIndex=0;

render();

}

function toggleComplete(index){

tasks[index].completed=!tasks[index].completed;

render();

}

function deleteTask(index){

if(confirm("Delete this task?")){

tasks.splice(index,1);

render();

}

}

function editTask(index){

let newTitle=prompt(

"Edit Task",

tasks[index].title

);

if(newTitle && newTitle.trim()!=""){

tasks[index].title=newTitle;

render();

}

}

function searchTask(){

let value=document

.getElementById("search")

.value

.toLowerCase();

let cards=document.querySelectorAll(".task");

cards.forEach(card=>{

let text=card.innerText.toLowerCase();

card.style.display=text.includes(value)

?"flex"

:"none";

});

}

function toggleTheme(){

document.body.classList.toggle("dark");

}
/* ---------- Auto Save & Startup ---------- */

document.getElementById("task").addEventListener("keypress",function(e){

if(e.key==="Enter"){

addTask();

}

});

/* ---------- Dark Theme ---------- */

const darkStyle=document.createElement("style");

darkStyle.innerHTML=`

.dark{

background:linear-gradient(135deg,#020617,#111827,#1e293b);

}

.dark .sidebar{

background:rgba(15,23,42,.92);

}

.dark .card{

background:rgba(30,41,59,.85);

color:white;

}

.dark .task{

background:#1e293b;

color:white;

}

.dark .info p{

color:#cbd5e1;

}

.dark input,

.dark select{

background:#334155;

color:white;

}

.dark .search{

background:#334155;

color:white;

}

.dark .theme{

background:#22c55e;

color:white;

}

.dark .addBtn{

background:#0ea5e9;

}

.dark .addBtn:hover{

background:#0284c7;

}

`;

document.head.appendChild(darkStyle);

/* ---------- Sample Tasks (Only First Time) ---------- */

if(tasks.length===0){

tasks.push(

{

title:"Complete Web Development Project",

date:"2026-06-30",

time:"10:00",

priority:"High",

completed:false

},

{

title:"Study JavaScript",

date:"2026-07-01",

time:"18:00",

priority:"Medium",

completed:false

},

{

title:"Morning Exercise",

date:"2026-06-29",

time:"06:30",

priority:"Low",

completed:true

}

);

}

/* ---------- Initial Render ---------- */

render();

</script>

</body>

</html>
